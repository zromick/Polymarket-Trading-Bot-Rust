[build]
target = "index.html"
release = false
dist = "dist"
public_url = "/"
inject_scripts = true
# Avoid integrity mismatch when dev server rebuilds (stale cache); remove for production if desired
no_sri = true

[watch]
watch = []
ignore = []

[serve]
# Listen on all interfaces so you can open http://<this-machine-ip>:3000 from another device
addresses = ["0.0.0.0"]
port = 3000
open = false

# Proxy only /api/* to the backend (not /) to avoid "Nesting at the root" panic
[[proxy]]
backend = "http://127.0.0.1:8000/api/"

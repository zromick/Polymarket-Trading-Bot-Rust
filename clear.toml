# CLOB API base URL (mainnet)
clob_host = "https://clob.polymarket.com"

chain_id = 137

# Web UI port
port = 8000

# When true, log trades but do not execute (use --simulation or set to false for live)
simulation = false

[copy]
# Leader address(es) to copy
target_address = [
    "0x2a2c53bd278c04da9962fcf96490e17f3dfb9bc1",
    "0x6480542954b70a674a74bd1a6015dec362dc8dc5",
    "0x204f72f35326db932158cba6adff0b9a1da95e14"
]
revert_trade = false
size_multiplier = 1
# How often to check targets' positions (seconds). Can use decimals, e.g. 0.5 = twice per second.
poll_interval_sec = 0.5

[exit]
take_profit = 0
stop_loss = 0
trailing_stop = 0

[filter]
buy_amount_limit_in_usd = 0
entry_trade_sec = 0
trade_sec_from_resolve = 0

[ui]
delta_highlight_sec = 10
delta_animation_sec = 2
